<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Sniffer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- JSX-Übersetzer (läuft direkt im Browser, kein Node.js nötig) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Recharts für Sparkline -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- Firebase (Datenbank für Passwort & Anordnung) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin:0;background:#08090A;">
<div id="root"></div>

<script type="text/babel">
/* ================================================================
   TRADE SNIFFER – Hauptdatei
   ---------------------------------------------------------------
   EINZIGE STELLE die du anpassen musst:
   Trage deine Firebase-Zugangsdaten unten ein (aus der Firebase
   Console → Projekteinstellungen → Deine Apps → Konfiguration).
   ================================================================ */
const firebaseConfig = {
  apiKey:            "HIER_DEINE_API_KEY",
  authDomain:        "HIER_DEINE_PROJEKTID.firebaseapp.com",
  projectId:         "HIER_DEINE_PROJEKTID",
  storageBucket:     "HIER_DEINE_PROJEKTID.appspot.com",
  messagingSenderId: "HIER_DEINE_SENDER_ID",
  appId:             "HIER_DEINE_APP_ID"
};

/* ---- Firebase initialisieren ---- */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function dbGet(key) {
  try { const s = await db.collection("settings").doc(key).get(); return s.exists ? s.data().value : null; }
  catch { return null; }
}
async function dbSet(key, value) { await db.collection("settings").doc(key).set({ value }); }
async function dbDelete(key) { try { await db.collection("settings").doc(key).delete(); } catch {} }

/* ---- React + Bibliotheken aus globalen Variablen ---- */
const { useState, useEffect } = React;
const { AreaChart, Area, ResponsiveContainer } = Recharts;

/* ---- Passwort-Hashing ---- */
const KEY_AUTH   = "auth_password_hash";
const KEY_LAYOUT = "dashboard_widgets";

async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ---- Marktdaten (Stand: 30.06.2026) ---- */
const sparkData = [{v:100},{v:104},{v:101},{v:108},{v:112},{v:109},{v:118},{v:124},{v:121},{v:130}];

const aiPicks = [
  { ticker:"NVDA", conf:64, note:"Rückgang vom Mai-Hoch; Quartalszahlen der Hyperscaler könnten als Erholungs-Katalysator dienen." },
  { ticker:"ASML", conf:83, note:"Analysten heben Kursziele wegen eines starken Auftragsbuchs für das Geschäftsjahr 2027 an." },
  { ticker:"LLY",  conf:81, note:"Medicare-Abdeckung für Adipositas-Präparate und Fortschritte bei Foundayo treiben Aktie auf Rekordhoch." },
];
const newsItems = [
  { ticker:"TSLA", s:"pos", text:"Morgan Stanley hebt Lieferprognose Q2 auf 413.000 Fahrzeuge an." },
  { ticker:"AMZN", s:"pos", text:"AWS erhöht KI-Chip-Kapazitätspreise bereits zum dritten Mal in Folge." },
  { ticker:"MSFT", s:"pos", text:"Microsoft sichert 20-Jahres-Stromabkommen mit Chevron für KI-Rechenzentrum in Texas." },
  { ticker:"AAPL", s:"neu", text:"Apple erhöht Mac- und iPad-Preise wegen angespannter Speicherchip-Lage." },
];
const watchlist = [
  { ticker:"NVDA",  price:"198,32", change: 1.7 },
  { ticker:"AAPL",  price:"281,74", change:-0.7 },
  { ticker:"MSFT",  price:"371,00", change: 0.7 },
  { ticker:"ASML",  price:"1.852", change: 4.9 },
];
const movers = { g:{ ticker:"PLTR", change:2.8 }, l:{ ticker:"SHOP", change:-2.3 } };
const tape = [...watchlist, movers.g, movers.l];
const INITIAL_WIDGETS = [
  { id:"ai", type:"ai", size:"large" }, { id:"news", type:"news", size:"wide" },
  { id:"portfolio", type:"portfolio", size:"wide" }, { id:"watchlist", type:"watchlist", size:"small" },
  { id:"movers", type:"movers", size:"small" }, { id:"alerts", type:"alerts", size:"small" },
];

/* ---- Inline-Icons (kein Icon-Paket nötig) ---- */
function Svg({ size=16, className="", children }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={className}>{children}</svg>;
}
const Lock     = ({size=16}) => <Svg size={size}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Svg>;
const Eye      = ({size=16}) => <Svg size={size}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Svg>;
const EyeOff   = ({size=16}) => <Svg size={size}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></Svg>;
const Sparkles = ({size=16}) => <Svg size={size}><path d="M12 2 9 9H2l5.5 4L5 20l7-4 7 4-2.5-7L22 9h-7z"/></Svg>;
const News_    = ({size=16}) => <Svg size={size}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></Svg>;
const Wallet_  = ({size=16}) => <Svg size={size}><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/><path d="M16 12h5v4h-5a2 2 0 0 1 0-4z"/></Svg>;
const Star_    = ({size=16}) => <Svg size={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Svg>;
const TUp      = ({size=16,className=""}) => <Svg size={size} className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></Svg>;
const TDown    = ({size=16,className=""}) => <Svg size={size} className={className}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></Svg>;
const Bell_    = ({size=16}) => <Svg size={size}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></Svg>;
const Grip     = ({size=14}) => <Svg size={size}><circle cx="9" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="9" cy="19" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="19" r="1.2" fill="currentColor" stroke="none"/></Svg>;
const Grid_    = ({size=14}) => <Svg size={size}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></Svg>;
const Check_   = ({size=14}) => <Svg size={size}><polyline points="20 6 9 17 4 12"/></Svg>;
const LogOut_  = ({size=14}) => <Svg size={size}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Svg>;
const ArrUp    = ({size=14}) => <Svg size={size}><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></Svg>;
const ArrDown  = ({size=14}) => <Svg size={size}><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></Svg>;

/* ---- Hilfs-Komponenten ---- */
function Change({ value, compact }) {
  const pos = value >= 0;
  return (
    <span className={`change ${pos ? "pos" : "neg"}`}>
      {pos ? <ArrUp size={compact?12:14}/> : <ArrDown size={compact?12:14}/>}
      {Math.abs(value).toFixed(1)}%
    </span>
  );
}
function WHead({ icon, title, sub }) {
  return (
    <div className="whead">
      <div className="wicon">{icon}</div>
      <div><div className="wtitle">{title}</div>{sub && <div className="wsub">{sub}</div>}</div>
    </div>
  );
}
function SizePrev({ shape }) {
  return <div className="spframe"><div className={`spshape sp-${shape}`}/></div>;
}

/* ---- Widget-Inhalte ---- */
function WaiContent() {
  return <>
    <WHead icon={<Sparkles size={16}/>} title="KI-Recherche" sub="Mögliche Chancen heute"/>
    <div className="ailist">
      {aiPicks.map(p => (
        <div className="aipick" key={p.ticker}>
          <div className="aitop"><span className="tpill">{p.ticker}</span><span className="conf">{p.conf}% Konfidenz</span></div>
          <p className="ainote">{p.note}</p>
        </div>
      ))}
    </div>
    <p className="wfooter">Stand: 30.06.2026 – kein Live-Feed, keine Anlageempfehlung.</p>
  </>;
}
function WnewsContent() {
  return <>
    <WHead icon={<News_ size={16}/>} title="Nachrichten" sub="Sortiert nach Relevanz"/>
    <div className="newslist">
      {newsItems.map((n,i) => (
        <div className="newsrow" key={i}>
          <span className={`dot dot-${n.s}`}/>
          <span className="tpill sm">{n.ticker}</span>
          <span className="newstext">{n.text}</span>
        </div>
      ))}
    </div>
  </>;
}
function WportfolioContent() {
  return <>
    <WHead icon={<Wallet_ size={16}/>} title="Portfolio" sub="Gesamtwert"/>
    <div className="portrow">
      <div><div className="portval">48.230,90 €</div><Change value={2.4}/></div>
      <div className="sparkbox">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={sparkData}>
            <defs>
              <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="var(--pos)" stopOpacity={0.45}/>
                <stop offset="100%" stopColor="var(--pos)" stopOpacity={0}/>
              </linearGradient>
            </defs>
            <Area type="monotone" dataKey="v" stroke="var(--pos)" strokeWidth={2} fill="url(#sg)"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  </>;
}
function WwatchlistContent() {
  return <>
    <WHead icon={<Star_ size={16}/>} title="Watchlist"/>
    <div className="wlist">
      {watchlist.slice(0,3).map(w => (
        <div className="wrow" key={w.ticker}>
          <span className="tpill sm">{w.ticker}</span>
          <span className="wprice">{w.price}</span>
          <Change value={w.change} compact/>
        </div>
      ))}
    </div>
  </>;
}
function WmoversContent() {
  return <>
    <WHead icon={<TUp size={16}/>} title="Tagesbewegung"/>
    <div className="mrow"><TUp size={14} className="ipos"/><span className="tpill sm">{movers.g.ticker}</span><Change value={movers.g.change} compact/></div>
    <div className="mrow"><TDown size={14} className="ineg"/><span className="tpill sm">{movers.l.ticker}</span><Change value={movers.l.change} compact/></div>
  </>;
}
function WalertsContent() {
  return <>
    <WHead icon={<Bell_ size={16}/>} title="Preisalarm"/>
    <p className="alerttxt">AAPL nähert sich deiner Marke von 290 $.</p>
  </>;
}
const RENDERERS = { ai:WaiContent, news:WnewsContent, portfolio:WportfolioContent, watchlist:WwatchlistContent, movers:WmoversContent, alerts:WalertsContent };

/* ---- Ticker-Band ---- */
function Ticker() {
  const items = [...tape, ...tape];
  return (
    <div className="ticker">
      <div className="ttrack">
        {items.map((t,i) => (
          <span className="titem" key={i}>
            <span className="tsym">{t.ticker}</span>
            <Change value={t.change} compact/>
          </span>
        ))}
      </div>
    </div>
  );
}

/* ---- Auth ---- */
function Shell({ children }) {
  return (
    <div className="shell">
      <Ticker/>
      <div className="center">
        <div className="card">
          <div className="wmark"><Lock size={18}/><span>TRADE SNIFFER</span></div>
          {children}
        </div>
      </div>
    </div>
  );
}

function Setup({ onDone }) {
  const [pw, setPw] = useState(""); const [pw2, setPw2] = useState("");
  const [show, setShow] = useState(false); const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);
  async function go(e) {
    e.preventDefault();
    if (pw.length < 4) { setErr("Mindestens 4 Zeichen."); return; }
    if (pw !== pw2)    { setErr("Passwörter stimmen nicht überein."); return; }
    setBusy(true);
    try { await onDone(pw); } catch { setErr("Speichern fehlgeschlagen – Firebase-Verbindung prüfen."); setBusy(false); }
  }
  return (
    <form onSubmit={go} className="aform">
      <p className="alead">Lege ein Passwort fest, um Trade Sniffer einzurichten.</p>
      <label className="alabel">Passwort wählen</label>
      <div className="iwrap">
        <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} className="ainput" autoFocus/>
        <button type="button" className="ieye" onClick={()=>setShow(s=>!s)}>{show?<EyeOff size={16}/>:<Eye size={16}/>}</button>
      </div>
      <label className="alabel">Passwort bestätigen</label>
      <input type={show?"text":"password"} value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} className="ainput"/>
      {err && <p className="aerr">{err}</p>}
      <button type="submit" className="asubmit" disabled={busy}>{busy?"Wird gespeichert …":"Passwort festlegen"}</button>
    </form>
  );
}

function Login({ onSubmit, onReset }) {
  const [pw, setPw] = useState(""); const [show, setShow] = useState(false);
  const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);
  const [confirm, setConfirm] = useState(false);
  async function go(e) {
    e.preventDefault(); setBusy(true); setErr("");
    try { await onSubmit(pw); } catch { setErr("Falsches Passwort."); setBusy(false); }
  }
  return (
    <form onSubmit={go} className="aform">
      <p className="alead">Willkommen zurück.</p>
      <label className="alabel">Passwort</label>
      <div className="iwrap">
        <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} className="ainput" autoFocus/>
        <button type="button" className="ieye" onClick={()=>setShow(s=>!s)}>{show?<EyeOff size={16}/>:<Eye size={16}/>}</button>
      </div>
      {err && <p className="aerr">{err}</p>}
      <button type="submit" className="asubmit" disabled={busy}>{busy?"Wird geprüft …":"Anmelden"}</button>
      <div className="resetrow">
        {!confirm
          ? <button type="button" className="lnk" onClick={()=>setConfirm(true)}>Passwort vergessen?</button>
          : <div className="rconfirm">
              <span>Sicher? Alle Daten werden gelöscht.</span>
              <div className="racts">
                <button type="button" className="lnk" onClick={onReset}>Ja, zurücksetzen</button>
                <button type="button" className="lnk muted" onClick={()=>setConfirm(false)}>Abbrechen</button>
              </div>
            </div>
        }
      </div>
    </form>
  );
}

/* ---- Dashboard ---- */
function Dashboard({ onLogout, persOk, onPersIssue }) {
  const [widgets, setWidgets] = useState(INITIAL_WIDGETS);
  const [loaded, setLoaded]   = useState(false);
  const [edit, setEdit]       = useState(false);
  const [drag, setDrag]       = useState(null);
  const [hover, setHover]     = useState(null);
  const [sizeOpen, setSizeOpen] = useState(null);

  useEffect(() => {
    let live = true;
    (async () => {
      try { const v = await dbGet(KEY_LAYOUT); if (live && v) setWidgets(JSON.parse(v)); }
      catch {} finally { if (live) setLoaded(true); }
    })();
    return () => { live = false; };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => { try { await dbSet(KEY_LAYOUT, JSON.stringify(widgets)); } catch { onPersIssue(); } })();
  }, [widgets, loaded]);

  function drop(tid) {
    if (!drag || drag === tid) { setDrag(null); setHover(null); return; }
    setWidgets(prev => {
      const a = [...prev], fi = a.findIndex(w=>w.id===drag), ti = a.findIndex(w=>w.id===tid);
      const [m] = a.splice(fi,1); a.splice(ti,0,m); return a;
    });
    setDrag(null); setHover(null);
  }

  function resize(id, size) { setWidgets(p=>p.map(w=>w.id===id?{...w,size}:w)); setSizeOpen(null); }

  return (
    <div className="dash">
      <Ticker/>
      <header className="dhead">
        <div className="wmark"><Lock size={16}/><span>TRADE SNIFFER</span></div>
        <div className="dacts">
          <button className={`pill ${edit?"active":""}`} onClick={()=>{setEdit(e=>!e);setSizeOpen(null);}}>
            {edit?<Check_ size={14}/>:<Grid_ size={14}/>}{edit?"Fertig":"Anordnen"}
          </button>
          <button className="pill ghost" onClick={onLogout}><LogOut_ size={14}/>Abmelden</button>
        </div>
      </header>
      {!persOk && <div className="pbanner">Datenbankverbindung unterbrochen – Änderungen nur für diese Sitzung.</div>}
      {sizeOpen && <div className="backdrop" onClick={()=>setSizeOpen(null)}/>}
      <main className="grid">
        {widgets.map((w,i) => {
          const R = RENDERERS[w.type];
          return (
            <div key={w.id}
              className={["kcard", `sz-${w.size}`, edit?"editing":"", drag===w.id?"dragging":"", hover===w.id&&drag&&drag!==w.id?"hovering":""].join(" ")}
              style={edit?{animationDelay:i%2===0?"0s":"0.13s"}:undefined}
              draggable={edit}
              onDragStart={()=>setDrag(w.id)}
              onDragOver={e=>{e.preventDefault();setHover(w.id);}}
              onDragLeave={()=>setHover(h=>h===w.id?null:h)}
              onDrop={()=>drop(w.id)}
              onDragEnd={()=>{setDrag(null);setHover(null);}}>
              {edit && <span className="dpin"><Grip size={14}/></span>}
              <R/>
              {edit && (
                <div className="rsz">
                  <button className="rsbtn" onClick={()=>setSizeOpen(id=>id===w.id?null:w.id)}>Größe</button>
                  {sizeOpen===w.id && (
                    <div className="smenu" onClick={e=>e.stopPropagation()}>
                      {[["small","Klein"],["wide","Breit"],["large","Groß"]].map(([k,l])=>(
                        <button key={k} className={`sopt ${w.size===k?"sel":""}`} onClick={()=>resize(w.id,k)}>
                          <SizePrev shape={k}/><span>{l}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </main>
      <p className="pfooter">Kurse und Nachrichten: Schnappschuss vom 30.06.2026 – noch ohne Live-Anbindung.</p>
    </div>
  );
}

/* ---- App-Wurzel ---- */
function App() {
  const [screen, setScreen]   = useState("loading");
  const [hash, setHash]       = useState(null);
  const [persOk, setPersOk]   = useState(true);

  useEffect(() => {
    let live = true;
    (async () => {
      try { const h = await dbGet(KEY_AUTH); if(!live) return; if(h){setHash(h);setScreen("login");}else{setScreen("setup");} }
      catch { if(live){setPersOk(false);setScreen("setup");} }
    })();
    return () => { live = false; };
  }, []);

  async function setup(pw) { const h = await hashPw(pw); await dbSet(KEY_AUTH,h); setHash(h); setScreen("dashboard"); }
  async function login(pw) { const h = await hashPw(pw); if(h!==hash) throw new Error("falsch"); setScreen("dashboard"); }
  async function reset()   { await dbDelete(KEY_AUTH); await dbDelete(KEY_LAYOUT); setHash(null); setScreen("setup"); }

  return (
    <div id="ts" style={{"--bg":"#08090A","--sf":"#1A1B1D","--sf2":"#222426","--bd":"#323436","--tx":"#ECEAE5","--txm":"#8C8D90","--ac":"#3FC6C2","--pos":"#5FAE7C","--neg":"#C9695A"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        *,*::before,*::after{box-sizing:border-box;} body{margin:0;}
        #ts{font-family:'Inter',sans-serif;color:var(--tx);min-height:100vh;
          background:radial-gradient(1200px 600px at 15% -10%,rgba(63,198,194,.08),transparent),
          repeating-linear-gradient(115deg,rgba(255,255,255,.012) 0px,rgba(255,255,255,.012) 1px,transparent 1px,transparent 7px),
          var(--bg);}
        #ts button{font-family:inherit;cursor:pointer;} #ts input{font-family:inherit;}
        #ts *:focus-visible{outline:2px solid var(--ac);outline-offset:2px;}
        .wmark{display:flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-weight:600;
          letter-spacing:.06em;color:var(--ac);font-size:15px;white-space:nowrap;}
        /* Ticker */
        .ticker{overflow:hidden;border-bottom:1px solid var(--bd);background:var(--sf2);}
        .ttrack{display:flex;width:max-content;gap:28px;padding:7px 16px;animation:marquee 26s linear infinite;}
        .titem{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--txm);white-space:nowrap;}
        .tsym{color:var(--tx);font-weight:600;}
        @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
        /* Auth */
        .shell{min-height:100vh;display:flex;flex-direction:column;}
        .center{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
        .card{width:100%;max-width:360px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;
          padding:32px 28px;display:flex;flex-direction:column;gap:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
        .aform{display:flex;flex-direction:column;gap:6px;}
        .alead{color:var(--txm);font-size:14px;margin:0 0 10px;}
        .alabel{font-size:12px;color:var(--txm);margin-top:10px;margin-bottom:6px;}
        .iwrap{position:relative;display:flex;align-items:center;}
        .ainput{width:100%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);border-radius:10px;padding:11px 38px 11px 13px;font-size:14px;}
        .ieye{position:absolute;right:8px;background:none;border:none;color:var(--txm);display:flex;padding:4px;}
        .aerr{color:var(--neg);font-size:12px;margin:4px 0 0;}
        .asubmit{margin-top:18px;background:var(--ac);color:#082422;border:none;font-weight:600;font-size:14px;padding:12px;border-radius:10px;transition:filter .15s;}
        .asubmit:hover:not(:disabled){filter:brightness(1.08);} .asubmit:disabled{opacity:.6;cursor:default;}
        .resetrow{margin-top:4px;}
        .lnk{background:none;border:none;color:var(--ac);font-size:12px;padding:2px 0;}
        .lnk.muted{color:var(--txm);}
        .rconfirm{display:flex;flex-direction:column;gap:8px;}
        .rconfirm span{font-size:12px;color:var(--txm);line-height:1.4;}
        .racts{display:flex;gap:14px;}
        /* Dashboard */
        .dash{min-height:100vh;}
        .dhead{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--bd);}
        .dacts{display:flex;gap:10px;}
        .pill{display:flex;align-items:center;gap:6px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);
          font-size:13px;padding:8px 14px;border-radius:999px;transition:border-color .15s;}
        .pill:hover{border-color:var(--ac);} .pill.active{background:var(--ac);color:#082422;border-color:var(--ac);}
        .pill.ghost{color:var(--txm);}
        .pbanner{margin:14px 22px 0;padding:10px 14px;border-radius:10px;background:var(--sf2);border:1px solid var(--ac);color:var(--txm);font-size:12px;line-height:1.4;}
        .pfooter{text-align:center;color:var(--txm);font-size:11px;padding:18px 0 26px;}
        /* Grid */
        .grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:168px;grid-auto-flow:dense;gap:16px;padding:22px;}
        .sz-small{grid-column:span 1;grid-row:span 1;}
        .sz-wide{grid-column:span 2;grid-row:span 1;}
        .sz-large{grid-column:span 2;grid-row:span 2;}
        @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);}.sz-wide,.sz-large{grid-column:span 2;}}
        /* Card */
        .kcard{position:relative;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;
          display:flex;flex-direction:column;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;}
        .kcard:not(.editing):hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.28);}
        .kcard.editing{animation:jiggle .32s infinite ease-in-out alternate;cursor:grab;}
        .kcard.dragging{opacity:.4;} .kcard.hovering{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac) inset;}
        @keyframes jiggle{from{transform:rotate(-.5deg)}to{transform:rotate(.5deg)}}
        .dpin{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;background:var(--ac);color:#082422;
          display:flex;align-items:center;justify-content:center;}
        /* Widget internals */
        .whead{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
        .wicon{width:28px;height:28px;border-radius:8px;background:var(--sf2);color:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .wtitle{font-weight:600;font-size:13.5px;} .wsub{font-size:11px;color:var(--txm);}
        .wfooter{margin-top:auto;padding-top:8px;font-size:10px;color:var(--txm);}
        .tpill{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:2px 7px;border-radius:6px;}
        .tpill.sm{font-size:10px;padding:1px 6px;}
        .change{display:inline-flex;align-items:center;gap:2px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
        .change.pos{color:var(--pos);} .change.neg{color:var(--neg);}
        .ailist{display:flex;flex-direction:column;gap:10px;overflow:auto;}
        .aipick{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;}
        .aitop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
        .conf{font-size:11px;color:var(--ac);font-weight:600;}
        .ainote{font-size:12px;color:var(--txm);line-height:1.4;margin:0;}
        .newslist{display:flex;flex-direction:column;gap:9px;overflow:auto;}
        .newsrow{display:flex;align-items:center;gap:8px;font-size:12.5px;}
        .newstext{color:var(--txm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
        .dot-pos{background:var(--pos);} .dot-neg{background:var(--neg);} .dot-neu{background:var(--txm);}
        .portrow{display:flex;align-items:center;justify-content:space-between;flex:1;gap:14px;}
        .portval{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;margin-bottom:4px;}
        .sparkbox{width:50%;height:60px;}
        .wlist{display:flex;flex-direction:column;gap:8px;}
        .wrow{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
        .wprice{font-family:'IBM Plex Mono',monospace;color:var(--txm);}
        .mrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
        .ipos{color:var(--pos);} .ineg{color:var(--neg);}
        .alerttxt{font-size:12.5px;color:var(--txm);line-height:1.5;margin:0;}
        /* Resize */
        .rsz{position:absolute;bottom:8px;right:8px;}
        .rsbtn{background:var(--sf2);border:1px solid var(--bd);color:var(--txm);font-size:10px;padding:4px 9px;border-radius:999px;}
        .rsbtn:hover{border-color:var(--ac);color:var(--tx);}
        .smenu{position:absolute;bottom:30px;right:0;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:10px;display:flex;gap:8px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:50;}
        .sopt{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:1px solid transparent;border-radius:8px;padding:6px 8px;color:var(--txm);font-size:10px;}
        .sopt.sel{border-color:var(--ac);color:var(--tx);}
        .spframe{width:34px;height:30px;display:flex;align-items:center;justify-content:center;}
        .spshape{background:var(--ac);border-radius:3px;}
        .sp-small{width:14px;height:14px;} .sp-wide{width:26px;height:13px;} .sp-large{width:24px;height:24px;}
        .backdrop{position:fixed;inset:0;z-index:40;}
        @media(prefers-reduced-motion:reduce){.ttrack{animation:none;}.kcard.editing{animation:none;}}
      `}</style>

      {screen==="loading" && <Shell><p style={{color:"var(--txm)",fontSize:14}}>Wird geladen …</p></Shell>}
      {screen==="setup"   && <Shell><Setup onDone={setup}/></Shell>}
      {screen==="login"   && <Shell><Login onSubmit={login} onReset={reset}/></Shell>}
      {screen==="dashboard" && <Dashboard onLogout={()=>setScreen("login")} persOk={persOk} onPersIssue={()=>setPersOk(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
