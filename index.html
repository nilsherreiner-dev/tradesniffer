<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trade Sniffer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* Zeigt sofort etwas – bevor JavaScript überhaupt lädt */
    body { margin:0; background:#08090A; font-family:'Inter',sans-serif; color:#ECEAE5; }
    #boot { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    #boot-inner { text-align:center; }
    #boot-logo { color:#3FC6C2; font-family:'Fraunces',serif; font-size:20px; letter-spacing:.08em; margin-bottom:12px; }
    #boot-msg  { color:#8C8D90; font-size:14px; }
    #err-box   { display:none; margin:20px auto; max-width:420px; background:#1A1B1D;
                 border:1px solid #C9695A; border-radius:12px; padding:20px; color:#C9695A;
                 font-size:13px; line-height:1.6; }
  </style>
</head>
<body>

<!-- Sichtbar BEVOR React geladen ist -->
<div id="boot">
  <div id="boot-inner">
    <div id="boot-logo">⬡ TRADE SNIFFER</div>
    <div id="boot-msg">Wird geladen …</div>
    <div id="err-box"></div>
  </div>
</div>

<div id="root"></div>

<!-- React & Babel (JSX-Übersetzer) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase Realtime Database (wie Stashify) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script type="text/babel">
/* ================================================================
   TRADE SNIFFER
   ---------------------------------------------------------------
   NUR DIESE 6 WERTE musst du anpassen.
   Firebase Console → Projekteinstellungen → Deine Apps → Web
   ================================================================ */
const FIREBASE_CONFIG = {
  apiKey:            "HIER_DEINE_API_KEY",
  authDomain:        "HIER_DEINE_PROJEKTID.firebaseapp.com",
  projectId:         "HIER_DEINE_PROJEKTID",
  storageBucket:     "HIER_DEINE_PROJEKTID.appspot.com",
  messagingSenderId: "HIER_DEINE_SENDER_ID",
  appId:             "HIER_DEINE_APP_ID",
  databaseURL:       "https://tradesniffer-37962-default-rtdb.europe-west1.firebasedatabase.app/"
};
/* ================================================================ */

/* ---- Fehler sichtbar anzeigen statt schwarzer Seite ---- */
function showError(msg) {
  const b = document.getElementById("boot");
  const e = document.getElementById("err-box");
  if (b) b.style.display = "flex";
  if (e) { e.style.display = "block"; e.innerHTML = "⚠ " + msg; }
  document.getElementById("root").style.display = "none";
}

/* ---- Firebase ---- */
let db;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch(e) {
  showError("Firebase konnte nicht gestartet werden. Bitte prüfe deine Zugangsdaten in der index.html.<br><br>" + e.message);
}

async function dbGet(key) {
  try { const s = await db.ref("ts/" + key).once("value"); return s.val(); }
  catch { return null; }
}
async function dbSet(key, val) { await db.ref("ts/" + key).set(val); }
async function dbDel(key)      { await db.ref("ts/" + key).remove(); }

/* ---- React Hooks ---- */
const { useState, useEffect } = React;

/* ---- Passwort-Hash ---- */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

/* ---- Marktdaten (Schnappschuss 30.06.2026) ---- */
const SPARK = [100,104,101,108,112,109,118,124,121,130];
const AI_PICKS = [
  { t:"NVDA", c:64, n:"Rückgang vom Mai-Hoch; Hyperscaler-Zahlen könnten als Katalysator dienen." },
  { t:"ASML", c:83, n:"Analysten heben Kursziele wegen starkem Auftragsbuch für GJ 2027 an." },
  { t:"LLY",  c:81, n:"Medicare-Abdeckung für Adipositas-Mittel und Fortschritte bei Foundayo." },
];
const NEWS = [
  { t:"TSLA", s:"pos", x:"Morgan Stanley hebt Lieferprognose Q2 auf 413.000 Fahrzeuge an." },
  { t:"AMZN", s:"pos", x:"AWS erhöht KI-GPU-Preise bereits zum dritten Mal in Folge." },
  { t:"MSFT", s:"pos", x:"Microsoft sichert 20-Jahres-Stromvertrag mit Chevron für KI-Datacenter." },
  { t:"AAPL", s:"neu", x:"Apple erhöht Mac & iPad-Preise wegen angespannter Speicherchip-Lage." },
];
const WATCH = [
  { t:"NVDA", p:"198,32", ch: 1.7 },
  { t:"AAPL", p:"281,74", ch:-0.7 },
  { t:"MSFT", p:"371,00", ch: 0.7 },
  { t:"ASML", p:"1.852",  ch: 4.9 },
];
const MOVERS = { g:{ t:"PLTR", ch:2.8 }, l:{ t:"SHOP", ch:-2.3 } };
const TAPE   = [...WATCH, MOVERS.g, MOVERS.l];
const INIT_W = [
  {id:"ai",type:"ai",size:"large"},{id:"news",type:"news",size:"wide"},
  {id:"pf",type:"pf",size:"wide"},{id:"wl",type:"wl",size:"small"},
  {id:"mv",type:"mv",size:"small"},{id:"al",type:"al",size:"small"},
];

/* ---- Icons (inline SVG – keine externe Bibliothek) ---- */
const I = ({size=16,cl="",ch}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
  stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cl}>{ch}</svg>;
const Lock  = ({s=16}) => <I s={s} ch={[<rect key="r" x="3" y="11" width="18" height="11" rx="2"/>,<path key="p" d="M7 11V7a5 5 0 0 1 10 0v4"/>]}/>;
const Eye   = ({s=16}) => <I s={s} ch={[<path key="a" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>,<circle key="b" cx="12" cy="12" r="3"/>]}/>;
const EyeOff= ({s=16}) => <I s={s} ch={[<path key="a" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>,<line key="b" x1="1" y1="1" x2="23" y2="23"/>]}/>;
const Stars = ({s=16}) => <I s={s} ch={<path d="M12 2 9 9H2l5.5 4L5 20l7-4 7 4-2.5-7L22 9h-7z"/>}/>;
const News  = ({s=16}) => <I s={s} ch={[<path key="a" d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>,<path key="b" d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/>]}/>;
const Wlt   = ({s=16}) => <I s={s} ch={[<path key="a" d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5"/>,<path key="b" d="M16 12h5v4h-5a2 2 0 0 1 0-4z"/>]}/>;
const Str   = ({s=16}) => <I s={s} ch={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>}/>;
const TrUp  = ({s=16,cl=""}) => <I s={s} cl={cl} ch={[<polyline key="a" points="23 6 13.5 15.5 8.5 10.5 1 18"/>,<polyline key="b" points="17 6 23 6 23 12"/>]}/>;
const TrDn  = ({s=16,cl=""}) => <I s={s} cl={cl} ch={[<polyline key="a" points="23 18 13.5 8.5 8.5 13.5 1 6"/>,<polyline key="b" points="17 18 23 18 23 12"/>]}/>;
const Bell  = ({s=16}) => <I s={s} ch={[<path key="a" d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>,<path key="b" d="M13.73 21a2 2 0 0 1-3.46 0"/>]}/>;
const Grip  = ({s=14}) => <I s={s} ch={[5,12,19].flatMap(y=>[9,15].map(x=><circle key={x+","+y} cx={x} cy={y} r="1.2" fill="currentColor" stroke="none"/>))}/>;
const Grid  = ({s=14}) => <I s={s} ch={[[3,3],[14,3],[14,14],[3,14]].map(([x,y])=><rect key={x} x={x} y={y} width="7" height="7"/>)}/>;
const Chk   = ({s=14}) => <I s={s} ch={<polyline points="20 6 9 17 4 12"/>}/>;
const Out   = ({s=14}) => <I s={s} ch={[<path key="a" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>,<polyline key="b" points="16 17 21 12 16 7"/>,<line key="c" x1="21" y1="12" x2="9" y2="12"/>]}/>;
const ArrU  = ({s=14}) => <I s={s} ch={[<line key="a" x1="7" y1="17" x2="17" y2="7"/>,<polyline key="b" points="7 7 17 7 17 17"/>]}/>;
const ArrD  = ({s=14}) => <I s={s} ch={[<line key="a" x1="7" y1="7" x2="17" y2="17"/>,<polyline key="b" points="17 7 17 17 7 17"/>]}/>;

/* ---- Einfache Sparkline ohne externe Bibliothek ---- */
function Spark({ data }) {
  const mx = Math.max(...data), mn = Math.min(...data), w = 120, h = 50, r = mx - mn || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h-((v-mn)/r)*h}`).join(" ");
  const area = `M${pts.split(" ").map((p,i)=>i===0?`${p}`:p).join(" L")} L${w},${h} L0,${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:"100%",overflow:"visible"}}>
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#5FAE7C" stopOpacity=".45"/>
          <stop offset="100%" stopColor="#5FAE7C" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#sg)"/>
      <polyline points={pts} fill="none" stroke="#5FAE7C" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

/* ---- Hilfs-UI ---- */
function Change({ v, sm }) {
  const pos = v >= 0;
  return <span className={`ch ${pos?"pos":"neg"}`}>{pos?<ArrU s={sm?12:14}/>:<ArrD s={sm?12:14}/>}{Math.abs(v).toFixed(1)}%</span>;
}
function WH({ icon, title, sub }) {
  return <div className="wh"><div className="wi">{icon}</div><div><div className="wt">{title}</div>{sub&&<div className="ws">{sub}</div>}</div></div>;
}

/* ---- Widget-Inhalte ---- */
const W = {
  ai: () => <>
    <WH icon={<Stars s={16}/>} title="KI-Recherche" sub="Mögliche Chancen heute"/>
    <div className="ail">
      {AI_PICKS.map(p=>(
        <div className="aip" key={p.t}>
          <div className="apt"><span className="tp">{p.t}</span><span className="cn">{p.c}% Konfidenz</span></div>
          <p className="an">{p.n}</p>
        </div>
      ))}
    </div>
    <p className="wf">Stand: 30.06.2026 – kein Live-Feed, keine Anlageempfehlung.</p>
  </>,
  news: () => <>
    <WH icon={<News s={16}/>} title="Nachrichten" sub="Sortiert nach Relevanz"/>
    <div className="nl">{NEWS.map((n,i)=>(
      <div className="nr" key={i}><span className={`dt dt-${n.s}`}/><span className="tp sm">{n.t}</span><span className="nx">{n.x}</span></div>
    ))}</div>
  </>,
  pf: () => <>
    <WH icon={<Wlt s={16}/>} title="Portfolio" sub="Gesamtwert"/>
    <div className="pfr">
      <div><div className="pfv">48.230,90 €</div><Change v={2.4}/></div>
      <div className="spk"><Spark data={SPARK}/></div>
    </div>
  </>,
  wl: () => <>
    <WH icon={<Str s={16}/>} title="Watchlist"/>
    <div className="wll">{WATCH.slice(0,3).map(w=>(
      <div className="wr" key={w.t}><span className="tp sm">{w.t}</span><span className="wp">{w.p}</span><Change v={w.ch} sm/></div>
    ))}</div>
  </>,
  mv: () => <>
    <WH icon={<TrUp s={16}/>} title="Tagesbewegung"/>
    <div className="mr"><TrUp s={14} cl="ip"/><span className="tp sm">{MOVERS.g.t}</span><Change v={MOVERS.g.ch} sm/></div>
    <div className="mr"><TrDn s={14} cl="in"/><span className="tp sm">{MOVERS.l.t}</span><Change v={MOVERS.l.ch} sm/></div>
  </>,
  al: () => <>
    <WH icon={<Bell s={16}/>} title="Preisalarm"/>
    <p className="at">AAPL nähert sich deiner Marke von 290 $.</p>
  </>,
};

/* ---- Ticker-Band ---- */
function Ticker() {
  const items = [...TAPE,...TAPE];
  return <div className="tkr"><div className="ttr">{items.map((t,i)=>(
    <span className="ti" key={i}><span className="ts">{t.t}</span><Change v={t.ch} sm/></span>
  ))}</div></div>;
}

/* ---- Auth-Wrapper ---- */
function Shell({ ch }) {
  return <div className="sh"><Ticker/><div className="sc"><div className="cd">
    <div className="wm"><Lock s={18}/><span>TRADE SNIFFER</span></div>{ch}
  </div></div></div>;
}

function Setup({ onDone }) {
  const [pw,setPw]=useState(""); const [pw2,setPw2]=useState(""); const [show,setShow]=useState(false);
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  async function go(e) {
    e.preventDefault();
    if(pw.length<4){setErr("Mindestens 4 Zeichen.");return;}
    if(pw!==pw2){setErr("Passwörter stimmen nicht überein.");return;}
    setBusy(true);
    try{await onDone(pw);}catch(ex){setErr("Speichern fehlgeschlagen: "+ex.message);setBusy(false);}
  }
  return <form onSubmit={go} className="af">
    <p className="al">Lege dein Passwort fest.</p>
    <label className="lb">Passwort wählen</label>
    <div className="iw"><input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} className="ai" autoFocus/>
      <button type="button" className="ie" onClick={()=>setShow(s=>!s)}>{show?<EyeOff s={16}/>:<Eye s={16}/>}</button></div>
    <label className="lb">Passwort bestätigen</label>
    <input type={show?"text":"password"} value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} className="ai"/>
    {err&&<p className="ae">{err}</p>}
    <button type="submit" className="as" disabled={busy}>{busy?"Wird gespeichert …":"Passwort festlegen"}</button>
  </form>;
}

function Login({ onSubmit, onReset }) {
  const [pw,setPw]=useState(""); const [show,setShow]=useState(false);
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false); const [conf,setConf]=useState(false);
  async function go(e) {
    e.preventDefault();setBusy(true);setErr("");
    try{await onSubmit(pw);}catch{setErr("Falsches Passwort.");setBusy(false);}
  }
  return <form onSubmit={go} className="af">
    <p className="al">Willkommen zurück.</p>
    <label className="lb">Passwort</label>
    <div className="iw"><input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} className="ai" autoFocus/>
      <button type="button" className="ie" onClick={()=>setShow(s=>!s)}>{show?<EyeOff s={16}/>:<Eye s={16}/>}</button></div>
    {err&&<p className="ae">{err}</p>}
    <button type="submit" className="as" disabled={busy}>{busy?"Wird geprüft …":"Anmelden"}</button>
    <div className="rr">{!conf
      ?<button type="button" className="lk" onClick={()=>setConf(true)}>Passwort vergessen?</button>
      :<div className="rc"><span>Sicher? Alle Daten werden gelöscht.</span>
        <div className="ra"><button type="button" className="lk" onClick={onReset}>Ja</button>
          <button type="button" className="lk mu" onClick={()=>setConf(false)}>Abbrechen</button></div></div>}
    </div>
  </form>;
}

/* ---- Dashboard ---- */
function Dashboard({ onLogout, ok, onFail }) {
  const [widgets,setWidgets]=useState(INIT_W); const [loaded,setLoaded]=useState(false);
  const [edit,setEdit]=useState(false); const [drag,setDrag]=useState(null);
  const [hover,setHover]=useState(null); const [szOpen,setSzOpen]=useState(null);

  useEffect(()=>{
    let live=true;
    (async()=>{try{const v=await dbGet("layout");if(live&&v)setWidgets(JSON.parse(v));}catch{}finally{if(live)setLoaded(true);}})();
    return()=>{live=false;};
  },[]);
  useEffect(()=>{
    if(!loaded)return;
    (async()=>{try{await dbSet("layout",JSON.stringify(widgets));}catch{onFail();}})();
  },[widgets,loaded]);

  function drop(tid){
    if(!drag||drag===tid){setDrag(null);setHover(null);return;}
    setWidgets(p=>{const a=[...p],fi=a.findIndex(w=>w.id===drag),ti=a.findIndex(w=>w.id===tid);const[m]=a.splice(fi,1);a.splice(ti,0,m);return a;});
    setDrag(null);setHover(null);
  }
  function resize(id,sz){setWidgets(p=>p.map(w=>w.id===id?{...w,size:sz}:w));setSzOpen(null);}

  return <div className="dsh">
    <Ticker/>
    <header className="dh">
      <div className="wm"><Lock s={16}/><span>TRADE SNIFFER</span></div>
      <div className="da">
        <button className={`pl ${edit?"ac":""}`} onClick={()=>{setEdit(e=>!e);setSzOpen(null);}}>
          {edit?<Chk s={14}/>:<Grid s={14}/>}{edit?"Fertig":"Anordnen"}
        </button>
        <button className="pl gh" onClick={onLogout}><Out s={14}/>Abmelden</button>
      </div>
    </header>
    {!ok&&<div className="pb">Datenbankverbindung unterbrochen – Änderungen bleiben nur für diese Sitzung.</div>}
    {szOpen&&<div className="bk" onClick={()=>setSzOpen(null)}/>}
    <main className="gr">
      {widgets.map((w,i)=>{const R=W[w.type];return(
        <div key={w.id}
          className={["kc",`sz-${w.size}`,edit?"ed":"",drag===w.id?"dr":"",hover===w.id&&drag&&drag!==w.id?"hv":""].join(" ")}
          style={edit?{animationDelay:i%2===0?"0s":"0.13s"}:undefined}
          draggable={edit}
          onDragStart={()=>setDrag(w.id)} onDragOver={e=>{e.preventDefault();setHover(w.id);}}
          onDragLeave={()=>setHover(h=>h===w.id?null:h)} onDrop={()=>drop(w.id)}
          onDragEnd={()=>{setDrag(null);setHover(null);}}>
          {edit&&<span className="dp"><Grip s={14}/></span>}
          <R/>
          {edit&&<div className="rs">
            <button className="rb" onClick={()=>setSzOpen(id=>id===w.id?null:w.id)}>Größe</button>
            {szOpen===w.id&&<div className="sm" onClick={e=>e.stopPropagation()}>
              {[["small","Klein"],["wide","Breit"],["large","Groß"]].map(([k,l])=>(
                <button key={k} className={`so ${w.size===k?"sl":""}`} onClick={()=>resize(w.id,k)}>
                  <div className="spf"><div className={`sps sp-${k}`}/></div><span>{l}</span>
                </button>
              ))}
            </div>}
          </div>}
        </div>
      );})}
    </main>
    <p className="pf">Schnappschuss 30.06.2026 – noch ohne Live-Anbindung.</p>
  </div>;
}

/* ---- App ---- */
function App() {
  const [screen,setScreen]=useState("loading");
  const [hash,setHash]=useState(null); const [ok,setOk]=useState(true);

  useEffect(()=>{
    if(!db){setScreen("setup");return;}
    let live=true;
    (async()=>{
      try{const h=await dbGet("hash");if(!live)return;if(h){setHash(h);setScreen("login");}else{setScreen("setup");}}
      catch(e){if(live){setOk(false);setScreen("setup");showError("Datenbank nicht erreichbar: "+e.message);}}
    })();
    return()=>{live=false;};
  },[]);

  async function setup(pw){const h=await hashPw(pw);await dbSet("hash",h);setHash(h);document.getElementById("boot").style.display="none";setScreen("dashboard");}
  async function login(pw){const h=await hashPw(pw);if(h!==hash)throw new Error("falsch");document.getElementById("boot").style.display="none";setScreen("dashboard");}
  async function reset(){await dbDel("hash");await dbDel("layout");setHash(null);setScreen("setup");}

  // Boot-Screen ausblenden sobald React bereit ist
  useEffect(()=>{
    if(screen!=="loading"){
      const b=document.getElementById("boot");
      if(b&&screen==="dashboard")b.style.display="none";
    }
  },[screen]);

  const CSS = `
    *,*::before,*::after{box-sizing:border-box;}
    .wm{display:flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-weight:600;letter-spacing:.06em;color:#3FC6C2;font-size:15px;white-space:nowrap;}
    .tkr{overflow:hidden;border-bottom:1px solid #323436;background:#222426;}
    .ttr{display:flex;width:max-content;gap:28px;padding:7px 16px;animation:mq 26s linear infinite;}
    .ti{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8D90;white-space:nowrap;}
    .ts{color:#ECEAE5;font-weight:600;}
    @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ch{display:inline-flex;align-items:center;gap:2px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
    .ch.pos{color:#5FAE7C;}.ch.neg{color:#C9695A;}
    .sh{min-height:100vh;display:flex;flex-direction:column;background:radial-gradient(1200px 600px at 15% -10%,rgba(63,198,194,.08),transparent),repeating-linear-gradient(115deg,rgba(255,255,255,.012) 0px,rgba(255,255,255,.012) 1px,transparent 1px,transparent 7px),#08090A;}
    .sc{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
    .cd{width:100%;max-width:360px;background:#1A1B1D;border:1px solid #323436;border-radius:16px;padding:32px 28px;display:flex;flex-direction:column;gap:18px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
    .af{display:flex;flex-direction:column;gap:6px;}
    .al{color:#8C8D90;font-size:14px;margin:0 0 10px;}
    .lb{font-size:12px;color:#8C8D90;margin-top:10px;margin-bottom:6px;}
    .iw{position:relative;display:flex;align-items:center;}
    .ai{width:100%;background:#222426;border:1px solid #323436;color:#ECEAE5;border-radius:10px;padding:11px 38px 11px 13px;font-size:14px;font-family:'Inter',sans-serif;}
    .ie{position:absolute;right:8px;background:none;border:none;color:#8C8D90;display:flex;padding:4px;cursor:pointer;}
    .ae{color:#C9695A;font-size:12px;margin:4px 0 0;}
    .as{margin-top:18px;background:#3FC6C2;color:#082422;border:none;font-weight:600;font-size:14px;padding:12px;border-radius:10px;cursor:pointer;transition:filter .15s;font-family:'Inter',sans-serif;}
    .as:hover:not(:disabled){filter:brightness(1.08);}.as:disabled{opacity:.6;cursor:default;}
    .rr{margin-top:4px;}.lk{background:none;border:none;color:#3FC6C2;font-size:12px;padding:2px 0;cursor:pointer;font-family:'Inter',sans-serif;}
    .lk.mu{color:#8C8D90;}.rc{display:flex;flex-direction:column;gap:8px;}
    .rc span{font-size:12px;color:#8C8D90;line-height:1.4;}.ra{display:flex;gap:14px;}
    .dsh{min-height:100vh;background:radial-gradient(1200px 600px at 15% -10%,rgba(63,198,194,.08),transparent),repeating-linear-gradient(115deg,rgba(255,255,255,.012) 0px,rgba(255,255,255,.012) 1px,transparent 1px,transparent 7px),#08090A;}
    .dh{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid #323436;}
    .da{display:flex;gap:10px;}
    .pl{display:flex;align-items:center;gap:6px;background:#1A1B1D;border:1px solid #323436;color:#ECEAE5;font-size:13px;padding:8px 14px;border-radius:999px;transition:border-color .15s;font-family:'Inter',sans-serif;cursor:pointer;}
    .pl:hover{border-color:#3FC6C2;}.pl.ac{background:#3FC6C2;color:#082422;border-color:#3FC6C2;}.pl.gh{color:#8C8D90;}
    .pb{margin:14px 22px 0;padding:10px 14px;border-radius:10px;background:#222426;border:1px solid #3FC6C2;color:#8C8D90;font-size:12px;line-height:1.4;}
    .pf{text-align:center;color:#8C8D90;font-size:11px;padding:18px 0 26px;}
    .gr{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:168px;grid-auto-flow:dense;gap:16px;padding:22px;}
    .sz-small{grid-column:span 1;grid-row:span 1;}.sz-wide{grid-column:span 2;grid-row:span 1;}.sz-large{grid-column:span 2;grid-row:span 2;}
    @media(max-width:720px){.gr{grid-template-columns:repeat(2,1fr);}.sz-wide,.sz-large{grid-column:span 2;}}
    .kc{position:relative;background:#1A1B1D;border:1px solid #323436;border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;}
    .kc:not(.ed):hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.3);}
    .kc.ed{animation:jg .32s infinite ease-in-out alternate;cursor:grab;}
    .kc.dr{opacity:.4;}.kc.hv{border-color:#3FC6C2;box-shadow:0 0 0 1px #3FC6C2 inset;}
    @keyframes jg{from{transform:rotate(-.5deg)}to{transform:rotate(.5deg)}}
    .dp{position:absolute;top:8px;left:8px;width:22px;height:22px;border-radius:50%;background:#3FC6C2;color:#082422;display:flex;align-items:center;justify-content:center;}
    .wh{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .wi{width:28px;height:28px;border-radius:8px;background:#222426;color:#3FC6C2;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .wt{font-weight:600;font-size:13.5px;}.ws{font-size:11px;color:#8C8D90;}
    .wf{margin-top:auto;padding-top:8px;font-size:10px;color:#8C8D90;}
    .tp{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;background:#222426;border:1px solid #323436;color:#ECEAE5;padding:2px 7px;border-radius:6px;}
    .tp.sm{font-size:10px;padding:1px 6px;}
    .ail{display:flex;flex-direction:column;gap:10px;overflow:auto;}
    .aip{background:#222426;border:1px solid #323436;border-radius:10px;padding:10px 12px;}
    .apt{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .cn{font-size:11px;color:#3FC6C2;font-weight:600;}.an{font-size:12px;color:#8C8D90;line-height:1.4;margin:0;}
    .nl{display:flex;flex-direction:column;gap:9px;overflow:auto;}
    .nr{display:flex;align-items:center;gap:8px;font-size:12.5px;}
    .nx{color:#8C8D90;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .dt{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dt-pos{background:#5FAE7C;}.dt-neg{background:#C9695A;}.dt-neu{background:#8C8D90;}
    .pfr{display:flex;align-items:center;justify-content:space-between;flex:1;gap:14px;}
    .pfv{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;margin-bottom:4px;}
    .spk{width:50%;height:60px;}
    .wll{display:flex;flex-direction:column;gap:8px;}
    .wr{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
    .wp{font-family:'IBM Plex Mono',monospace;color:#8C8D90;}
    .mr{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
    .ip{color:#5FAE7C;}.in{color:#C9695A;}.at{font-size:12.5px;color:#8C8D90;line-height:1.5;margin:0;}
    .rs{position:absolute;bottom:8px;right:8px;}
    .rb{background:#222426;border:1px solid #323436;color:#8C8D90;font-size:10px;padding:4px 9px;border-radius:999px;cursor:pointer;font-family:'Inter',sans-serif;}
    .rb:hover{border-color:#3FC6C2;color:#ECEAE5;}
    .sm{position:absolute;bottom:30px;right:0;background:#1A1B1D;border:1px solid #323436;border-radius:12px;padding:10px;display:flex;gap:8px;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:50;}
    .so{display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:1px solid transparent;border-radius:8px;padding:6px 8px;color:#8C8D90;font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;}
    .so.sl{border-color:#3FC6C2;color:#ECEAE5;}
    .spf{width:34px;height:30px;display:flex;align-items:center;justify-content:center;}
    .sps{background:#3FC6C2;border-radius:3px;}
    .sp-small{width:14px;height:14px;}.sp-wide{width:26px;height:13px;}.sp-large{width:24px;height:24px;}
    .bk{position:fixed;inset:0;z-index:40;}
    *:focus-visible{outline:2px solid #3FC6C2;outline-offset:2px;}
    @media(prefers-reduced-motion:reduce){.ttr{animation:none;}.kc.ed{animation:none;}}
  `;

  return <>
    <style>{CSS}</style>
    {screen==="setup"     && <Shell ch={<Setup onDone={setup}/>}/>}
    {screen==="login"     && <Shell ch={<Login onSubmit={login} onReset={reset}/>}/>}
    {screen==="loading"   && <Shell ch={<p style={{color:"#8C8D90",fontSize:14}}>Verbindung wird hergestellt …</p>}/>}
    {screen==="dashboard" && <Dashboard onLogout={()=>setScreen("login")} ok={ok} onFail={()=>setOk(false)}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
