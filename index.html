/* ---- Passwort ---- */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

/* ---- Finnhub: Live-Kurse ---- */
async function fetchQuote(ticker) {
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "quote",
        params: {
          symbol: ticker
        }
      })
    });
    const d = await r.json();
    if (!d || !d.c || d.c === 0) return null;
    return {
      price: d.c,
      change: d.dp,
      prev: d.pc
    };
  } catch {
    return null;
  }
}
async function fetchAllQuotes(extraTickers = []) {
  const results = {};
  // Hardcoded Watchlist + eigene Positionen zusammenführen
  const all = [...QUOTE_TICKERS.map(p => p.ticker)];
  extraTickers.forEach(t => {
    if (t && !all.includes(t)) all.push(t);
  });
  await Promise.all(all.map(async ticker => {
    const q = await fetchQuote(ticker);
    if (q) results[ticker] = q;
  }));
  return results;
}

/* ---- Finnhub: News ---- */
async function fetchNewsForTicker(ticker) {
  const to = new Date().toISOString().split("T")[0];
  const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split("T")[0];
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "company-news",
        params: {
          symbol: ticker,
          from,
          to
        }
      })
    });
    const d = await r.json();
    return Array.isArray(d) ? d.slice(0, 5).map(n => ({
      ...n,
      ticker
    })) : [];
  } catch {
    return [];
  }
}
async function fetchMarketNews() {
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "news",
        params: {
          category: "general"
        }
      })
    });
    const d = await r.json();
    return Array.isArray(d) ? d.slice(0, 10) : [];
  } catch {
    return [];
  }
}
async function fetchAllNews() {
  const [market, ...perStock] = await Promise.all([fetchMarketNews(), ...QUOTE_TICKERS.map(p => fetchNewsForTicker(p.ticker))]);
  const stock = perStock.flat();
  // Duplikate entfernen
  const seen = new Set();
  return [...stock, ...market].filter(n => {
    if (seen.has(n.id || n.headline)) return false;
    seen.add(n.id || n.headline);
    return true;
  }).slice(0, 25);
}

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Datei konnte nicht gelesen werden"));
    r.readAsDataURL(file);
  });
}
function calcPL(pos, quotes) {
  const q = quotes[pos.ticker];
  if (!q || !pos.shares || !pos.avgPrice) return null;
  const current = q.price * pos.shares;
  const cost = pos.avgPrice * pos.shares;
  const plAbs = current - cost;
  const plPct = (current - cost) / cost * 100;
  return {
    current,
    cost,
    plAbs,
    plPct,
    price: q.price
  };
}
