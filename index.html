/* ---- Passwort ---- */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

/* ---- Finnhub: Live-Kurse ---- */
async function fetchQuote(ticker) {
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "quote",
        params: {
          symbol: ticker
        }
      })
    });
    const d = await r.json();
    if (!d || !d.c || d.c === 0) return null;
    return {
      price: d.c,
      change: d.dp,
      prev: d.pc
    };
  } catch {
    return null;
  }
}
async function fetchAllQuotes() {
  const results = {};
  await Promise.all(QUOTE_TICKERS.map(async p => {
    const q = await fetchQuote(p.ticker);
    if (q) results[p.ticker] = q;
  }));
  return results;
}

/* ---- Finnhub: News ---- */
async function fetchNewsForTicker(ticker) {
  const to = new Date().toISOString().split("T")[0];
  const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split("T")[0];
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "company-news",
        params: {
          symbol: ticker,
          from,
          to
        }
      })
    });
    const d = await r.json();
    return Array.isArray(d) ? d.slice(0, 5).map(n => ({
      ...n,
      ticker
    })) : [];
  } catch {
    return [];
  }
}
async function fetchMarketNews() {
  try {
    const r = await fetch(`${PROXY_URL}/finnhub`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        endpoint: "news",
        params: {
          category: "general"
        }
      })
    });
    const d = await r.json();
    return Array.isArray(d) ? d.slice(0, 10) : [];
  } catch {
    return [];
  }
}
async function fetchAllNews() {
  const [market, ...perStock] = await Promise.all([fetchMarketNews(), ...QUOTE_TICKERS.map(p => fetchNewsForTicker(p.ticker))]);
  const stock = perStock.flat();
  // Duplikate entfernen
  const seen = new Set();
  return [...stock, ...market].filter(n => {
    if (seen.has(n.id || n.headline)) return false;
    seen.add(n.id || n.headline);
    return true;
  }).slice(0, 25);
}

/* ---- Anthropic: KI-Analyse ---- */
async function analyzeWithClaude(news, quotes) {
  const newsText = news.slice(0, 20).map(n => `[${n.ticker || "Markt"}] ${n.headline}`).join("\n");
  const quoteText = Object.entries(quotes).map(([t, q]) => `${t}: $${q.price?.toFixed(2)} (${q.change?.toFixed(2)}%)`).join(", ");
  const prompt = `Du bist mein persönlicher KI-Trading-Assistent. 

Mein Portfolio: ${ALL_NAMES}
Mein Trading-Stil: Mix aus langfristigen Positionen und kurzfristigen Momentum-Trades. 
Schwerpunkt Quantencomputing und Verteidigung. Habe z.B. bei Everspin einen Swing-Trade gemacht und mein Geld verdoppelt.

Aktuelle Kurse: ${quoteText || "Werden geladen..."}

Heutige Nachrichten:
${newsText}

Analysiere alles und antworte NUR in diesem JSON-Format (kein Text davor oder danach, kein Markdown):
{
  "briefing": "2-3 Sätze: Was ist heute das Wichtigste für mein Portfolio?",
  "watchOut": "Ein konkreter Hinweis was ich heute besonders beobachten sollte",
  "topNews": [
    {"ticker":"NVDA","headline":"...","relevance":"hoch","reason":"...","sentiment":"pos"}
  ],
  "opportunities": [
    {"ticker":"...","name":"...","reason":"...","confidence":80}
  ]
}`;
  const resp = await fetch(`${PROXY_URL}/claude`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1500,
      messages: [{
        role: "user",
        content: prompt
      }]
    })
  });
  const data = await resp.json();
  if (!data.content?.[0]?.text) throw new Error("Keine Antwort von Claude");
  const text = data.content[0].text.replace(/```json|```/g, "").trim();
  return JSON.parse(text);
}
